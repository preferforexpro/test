<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Live Scanner · MT5</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--s1:#060606;--s2:#0b0b0b;--b1:#161616;--b2:#1e1e1e;
  --bull:#00ff88;--bull-d:rgba(0,255,136,.07);
  --bear:#ff0055;--bear-d:rgba(255,0,85,.07);
  --amber:#ffc200;--amber-d:rgba(255,194,0,.07);
  --cyan:#00ccff;--cyan-d:rgba(0,204,255,.08);
  --purple:#aa66ff;
  --dim:#222;--mid:#3a3a3a;--txt:#666;--bright:#aaa;--white:#ddd;
  --font:'Fira Code',monospace;--disp:'Bebas Neue',cursive;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:11px;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}

/* ── TICKER ── */
.ticker{height:26px;background:var(--s1);border-bottom:1px solid var(--b1);overflow:hidden;display:flex;align-items:center;flex-shrink:0;}
.ticker-inner{display:flex;white-space:nowrap;animation:scroll 160s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:5px;padding:0 16px;border-right:1px solid var(--b1);font-size:10px;}
.tick-pair{color:var(--bright);font-weight:500;}
.tick-bull{color:var(--bull);}
.tick-bear{color:var(--bear);}
.tick-logo{padding:0 14px;font-family:var(--disp);font-size:13px;color:var(--amber);letter-spacing:2px;border-right:1px solid var(--b1);flex-shrink:0;}

/* ── LAYOUT ── */
.shell{display:flex;flex-direction:column;height:100vh;}
.body{display:flex;flex:1;overflow:hidden;}
.left{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--b1);}
.right{width:252px;display:flex;flex-direction:column;flex-shrink:0;}

/* ── HEADER ── */
.hdr{padding:9px 14px;border-bottom:1px solid var(--b1);background:var(--s1);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0;}
.logo{font-family:var(--disp);font-size:20px;color:var(--bull);letter-spacing:3px;}
.logo span{color:var(--amber);}
.conn-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;}
.pill-live{border-color:var(--bull);color:var(--bull);}
.pill-sim {border-color:var(--amber);color:var(--amber);}
.pill-conn{border-color:var(--cyan);color:var(--cyan);}
.pill-disc{border-color:var(--mid);color:var(--txt);}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.dot.pulse{animation:blink 1.1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.hdr-stats{display:flex;gap:18px;}
.hs{text-align:right;}
.hs-l{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1px;}
.hs-v{font-size:15px;font-family:var(--disp);letter-spacing:1px;}
.c-bull{color:var(--bull);}
.c-bear{color:var(--bear);}
.c-amber{color:var(--amber);}
.c-cyan{color:var(--cyan);}
.c-purple{color:var(--purple);}

/* ── SERVER BAR ── */
.srv{padding:4px 14px;border-bottom:1px solid var(--b1);background:#030303;
  display:flex;align-items:center;gap:10px;font-size:8px;flex-shrink:0;flex-wrap:wrap;}
.srv-item{display:flex;align-items:center;gap:5px;}
.srv-dot{width:5px;height:5px;border-radius:50%;}
.srv-ok{background:var(--bull);}
.srv-err{background:var(--bear);}
.srv-wait{background:var(--amber);animation:blink 1s infinite;}
.srv-val{color:var(--bright);}
.srv-r{margin-left:auto;color:var(--dim);}

/* ── CONTROLS ── */
.ctrl{padding:6px 14px;border-bottom:1px solid var(--b1);background:var(--s2);
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.cl{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-right:2px;}
.btn{padding:3px 8px;border:1px solid var(--b2);background:transparent;
  color:var(--txt);font-family:var(--font);font-size:9px;cursor:pointer;transition:all .1s;}
.btn:hover{border-color:var(--mid);color:var(--bright);}
.btn.on{border-color:var(--amber);color:var(--amber);background:var(--amber-d);}
.btn-snd{padding:3px 8px;border:1px solid var(--mid);background:transparent;
  color:var(--txt);font-family:var(--font);font-size:9px;cursor:pointer;}
.btn-snd.on{border-color:var(--cyan);color:var(--cyan);}
.divvr{width:1px;height:14px;background:var(--b2);margin:0 3px;}
.ml-a{margin-left:auto;}
.scan-info{font-size:8px;color:var(--dim);display:flex;align-items:center;gap:6px;}
.sp-bar{width:60px;height:2px;background:var(--b1);}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--bull));transition:width .4s;}

/* ── TABLE ── */
.tbl-w{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;}
thead{position:sticky;top:0;z-index:10;}
thead th{padding:5px 9px;text-align:left;font-size:7px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--dim);background:var(--s2);
  border-bottom:1px solid var(--b1);border-right:1px solid var(--b1);white-space:nowrap;}
thead th:last-child{border-right:none;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.025);transition:background .08s;}
tbody tr:hover{background:rgba(255,255,255,.012);}
tbody tr.fb{animation:fb .55s ease-out;}
tbody tr.fr{animation:fr .55s ease-out;}
@keyframes fb{0%{background:rgba(0,255,136,.12)}100%{background:transparent}}
@keyframes fr{0%{background:rgba(255,0,85,.12)}100%{background:transparent}}
td{padding:4px 9px;border-right:1px solid rgba(255,255,255,.02);white-space:nowrap;vertical-align:middle;}
td:last-child{border-right:none;}
.cat-r td{background:var(--s1);color:var(--dim);font-size:7px;text-transform:uppercase;
  letter-spacing:2px;padding:3px 9px;border-top:1px solid var(--b1);}
.pair-n{font-size:11px;font-weight:500;color:var(--white);letter-spacing:.5px;}
.pair-c{font-size:7px;color:var(--dim);text-transform:uppercase;}
.pair-upd{font-size:7px;color:var(--dim);}
.price{font-size:11px;font-variant-numeric:tabular-nums;color:var(--bright);}
.chg-b{color:var(--bull);font-size:9px;}
.chg-r{color:var(--bear);font-size:9px;}
.spread{font-size:7px;color:var(--mid);}

/* sparkline */
.sp-w{width:76px;height:20px;display:inline-block;vertical-align:middle;}
svg.sp{width:76px;height:20px;overflow:visible;}

/* signals */
.sig{display:inline-flex;align-items:center;padding:1px 6px;font-size:8px;font-weight:500;letter-spacing:.5px;white-space:nowrap;}
.sig-b{background:var(--bull-d);color:var(--bull);border:1px solid rgba(0,255,136,.15);}
.sig-r{background:var(--bear-d);color:var(--bear);border:1px solid rgba(255,0,85,.15);}
.sig-n{color:var(--dim);font-size:10px;}

/* bias */
.bias{display:inline-flex;align-items:center;padding:2px 7px;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.bias-b{background:var(--bull-d);color:var(--bull);border:1px solid rgba(0,255,136,.2);}
.bias-r{background:var(--bear-d);color:var(--bear);border:1px solid rgba(255,0,85,.2);}
.bias-n{background:rgba(255,255,255,.02);color:var(--mid);border:1px solid var(--b2);}

/* score */
.score{display:flex;align-items:center;gap:3px;}
.sc-n{font-size:10px;font-family:var(--disp);min-width:10px;}
.sc-pips{display:flex;gap:2px;}
.sc-pip{width:5px;height:9px;}

/* pd zone */
.pd{display:inline-flex;align-items:center;gap:3px;font-size:8px;padding:1px 6px;}
.pd-p{background:rgba(255,0,85,.07);color:var(--bear);border:1px solid rgba(255,0,85,.15);}
.pd-d{background:rgba(0,255,136,.07);color:var(--bull);border:1px solid rgba(0,255,136,.15);}

/* RIGHT PANEL */
.rp-hdr{padding:7px 12px;border-bottom:1px solid var(--b1);background:var(--s1);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rp-t{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--amber);}
.al-cnt{font-family:var(--disp);font-size:14px;color:var(--amber);}
.alert-log{flex:1;overflow-y:auto;}
.al-item{padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.025);
  display:flex;flex-direction:column;gap:2px;animation:ain .2s ease-out;}
@keyframes ain{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.al-item.b{border-left:2px solid var(--bull);}
.al-item.r{border-left:2px solid var(--bear);}
.al-item.a{border-left:2px solid var(--amber);}
.al-r1{display:flex;align-items:center;justify-content:space-between;}
.al-pair{font-size:10px;font-weight:600;color:var(--white);}
.al-time{font-size:7px;color:var(--dim);}
.al-sig{font-size:8px;display:flex;align-items:center;gap:4px;}
.al-price{font-size:7px;color:var(--txt);font-variant-numeric:tabular-nums;}

/* session */
.sess-bar{padding:4px 14px;border-top:1px solid var(--b1);background:var(--s1);
  display:flex;align-items:center;gap:12px;flex-shrink:0;}
.sess{display:flex;align-items:center;gap:4px;font-size:8px;}
.sdot{width:5px;height:5px;border-radius:50%;}
.sess.on .sdot{animation:blink 1.1s ease-in-out infinite;}
.sess-right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:7px;color:var(--dim);}

/* loading skeleton */
.sk{display:inline-block;height:9px;border-radius:1px;
  background:linear-gradient(90deg,var(--s2) 25%,var(--b1) 50%,var(--s2) 75%);
  background-size:200% 100%;animation:shim 1.3s infinite;}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

.empty{padding:30px;text-align:center;color:var(--dim);font-size:10px;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef, useMemo} = React;

// ─────────────────────────────────────────────────────────
//  CONFIG  — update WS_URL to your server address
// ─────────────────────────────────────────────────────────
const WS_URL      = "ws://localhost:8000/ws/scan";
const API_URL     = "http://localhost:8000";
const RECONNECT_MS = 4000;

// ─────────────────────────────────────────────────────────
//  PAIR METADATA  (display info only – data comes from server)
// ─────────────────────────────────────────────────────────
const PAIR_META = {
  EURUSD:{d:'EUR/USD',c:'Major'}, GBPUSD:{d:'GBP/USD',c:'Major'}, USDJPY:{d:'USD/JPY',c:'Major'},
  USDCHF:{d:'USD/CHF',c:'Major'}, AUDUSD:{d:'AUD/USD',c:'Major'}, NZDUSD:{d:'NZD/USD',c:'Major'},
  USDCAD:{d:'USD/CAD',c:'Major'}, EURGBP:{d:'EUR/GBP',c:'Minor'}, EURJPY:{d:'EUR/JPY',c:'Minor'},
  EURCHF:{d:'EUR/CHF',c:'Minor'}, EURAUD:{d:'EUR/AUD',c:'Minor'}, EURNZD:{d:'EUR/NZD',c:'Minor'},
  EURCAD:{d:'EUR/CAD',c:'Minor'}, GBPJPY:{d:'GBP/JPY',c:'Minor'}, GBPCHF:{d:'GBP/CHF',c:'Minor'},
  GBPAUD:{d:'GBP/AUD',c:'Minor'}, GBPNZD:{d:'GBP/NZD',c:'Minor'}, GBPCAD:{d:'GBP/CAD',c:'Minor'},
  AUDJPY:{d:'AUD/JPY',c:'Minor'}, AUDCHF:{d:'AUD/CHF',c:'Minor'}, AUDNZD:{d:'AUD/NZD',c:'Minor'},
  AUDCAD:{d:'AUD/CAD',c:'Minor'}, NZDJPY:{d:'NZD/JPY',c:'Minor'}, NZDCHF:{d:'NZD/CHF',c:'Minor'},
  NZDCAD:{d:'NZD/CAD',c:'Minor'}, CHFJPY:{d:'CHF/JPY',c:'Minor'}, CADJPY:{d:'CAD/JPY',c:'Minor'},
  CADCHF:{d:'CAD/CHF',c:'Minor'}, USDMXN:{d:'USD/MXN',c:'Exotic'}, USDZAR:{d:'USD/ZAR',c:'Exotic'},
  USDTRY:{d:'USD/TRY',c:'Exotic'}, USDSGD:{d:'USD/SGD',c:'Exotic'}, USDHKD:{d:'USD/HKD',c:'Exotic'},
  USDNOK:{d:'USD/NOK',c:'Exotic'}, USDSEK:{d:'USD/SEK',c:'Exotic'}, USDDKK:{d:'USD/DKK',c:'Exotic'},
  USDPLN:{d:'USD/PLN',c:'Exotic'}, USDHUF:{d:'USD/HUF',c:'Exotic'}, USDCZK:{d:'USD/CZK',c:'Exotic'},
  EURTRY:{d:'EUR/TRY',c:'Exotic'}, USDINR:{d:'USD/INR',c:'Exotic'}, USDTHB:{d:'USD/THB',c:'Exotic'},
  USDMYR:{d:'USD/MYR',c:'Exotic'}, USDIDR:{d:'USD/IDR',c:'Exotic'}, USDPHP:{d:'USD/PHP',c:'Exotic'},
  USDCNH:{d:'USD/CNH',c:'Exotic'},
};
const ALL_SYMS = Object.keys(PAIR_META);

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function fmt(p){
  if(p==null||!isFinite(p))return'—';
  if(p>=10000)return p.toFixed(0);
  if(p>=1000) return p.toFixed(2);
  if(p>=100)  return p.toFixed(3);
  if(p>=10)   return p.toFixed(4);
  return p.toFixed(5);
}
function ago(ts){
  if(!ts)return'';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<5)return'now';if(s<60)return s+'s';
  if(s<3600)return Math.floor(s/60)+'m';
  return Math.floor(s/3600)+'h';
}
function getSessions(){
  const h=new Date().getUTCHours(),m=new Date().getUTCMinutes(),t=h+m/60;
  return{sydney:t>=22||t<7,tokyo:t>=0&&t<9,london:t>=7&&t<16,ny:t>=12&&t<21};
}

// ─────────────────────────────────────────────────────────
//  SOUND
// ─────────────────────────────────────────────────────────
let _ctx=null;
function beep(dir){
  try{
    if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=_ctx.createOscillator(),g=_ctx.createGain();
    o.connect(g);g.connect(_ctx.destination);
    o.frequency.value=dir===1?880:440;o.type='sine';
    g.gain.setValueAtTime(.18,_ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,_ctx.currentTime+.35);
    o.start(_ctx.currentTime);o.stop(_ctx.currentTime+.35);
  }catch{}
}

// ─────────────────────────────────────────────────────────
//  SPARKLINE
// ─────────────────────────────────────────────────────────
function Sparkline({spark,bias}){
  if(!spark||spark.length<2)return<span className="sig-n" style={{fontSize:9}}>—</span>;
  const w=76,h=20,mn=Math.min(...spark),mx=Math.max(...spark),rng=mx-mn||1;
  const pts=spark.map((v,i)=>`${i===0?'M':'L'}${((i/(spark.length-1))*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(' ');
  const col=bias===1?'var(--bull)':bias===-1?'var(--bear)':'var(--mid)';
  const lx=w,ly=h-((spark[spark.length-1]-mn)/rng)*h;
  return(
    <div className="sp-w">
      <svg className="sp" viewBox={`0 0 ${w} ${h}`}>
        <path d={pts} fill="none" stroke={col} strokeWidth="1.2" strokeLinecap="round"/>
        <circle cx={lx} cy={ly} r="2" fill={col}/>
      </svg>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  COMPONENTS
// ─────────────────────────────────────────────────────────
const Sk=({w=50})=><span className="sk" style={{width:w}}/>;

function Sig({type,label}){
  if(!label)return<span className="sig-n">—</span>;
  return<span className={`sig ${type===1?'sig-b':'sig-r'}`}>{label}</span>;
}
function Bias({v}){
  if(v===1) return<span className="bias bias-b">▲ BULL</span>;
  if(v===-1)return<span className="bias bias-r">▼ BEAR</span>;
  return<span className="bias bias-n">◆ NEUT</span>;
}
function ScoreBar({n,bias}){
  const col=bias===1?'var(--bull)':bias===-1?'var(--bear)':'var(--mid)';
  return(
    <div className="score">
      <span className="sc-n" style={{color:col}}>{n||0}</span>
      <div className="sc-pips">{[0,1,2,3,4,5].map(i=>(
        <div key={i} className="sc-pip" style={{background:i<(n||0)?col:'var(--b2)'}}/>
      ))}</div>
    </div>
  );
}
function PdZone({pd}){
  if(!pd)return<span className="sig-n">—</span>;
  return<span className={`pd ${pd.zone==='premium'?'pd-p':'pd-d'}`}>{pd.zone==='premium'?'⬆ PREM':'⬇ DISC'} {pd.pct}%</span>;
}

function PairRow({sym,d,updAt,flashCls}){
  const meta=PAIR_META[sym]||{d:sym,c:'—'};
  const loading=!d;
  return(
    <tr className={flashCls||''}>
      <td>
        <div className="pair-n">{meta.d}</div>
        <div className="pair-c">{meta.c}</div>
        <div className="pair-upd">{ago(updAt)}</div>
      </td>
      <td>
        {loading?<Sk w={68}/>:<>
          <div className="price">{fmt(d.price)}</div>
          <div className={d.change_pct>=0?'chg-b':'chg-r'}>{d.change_pct>=0?'+':''}{d.change_pct?.toFixed(3)}%</div>
          {d.ask&&d.bid&&<div className="spread">Spr {((d.ask-d.bid)*100000).toFixed(1)}</div>}
        </>}
      </td>
      <td>{loading?<Sk w={76}/>:<Sparkline spark={d.spark} bias={d.bias}/>}</td>
      <td>{loading?<Sk/>:<Sig type={d.fvg?.type} label={d.fvg?(d.fvg.type===1?'Bull FVG':'Bear FVG'):null}/>}</td>
      <td>{loading?<Sk/>:<Sig type={d.ob?.type}  label={d.ob ?(d.ob.type===1 ?'Bull OB' :'Bear OB' ):null}/>}</td>
      <td>{loading?<Sk w={44}/>:<Sig type={d.bos}   label={d.bos  !=null?(d.bos===1  ?'Bullish':'Bearish'):null}/>}</td>
      <td>{loading?<Sk w={44}/>:<Sig type={d.choch} label={d.choch!=null?(d.choch===1?'Bullish':'Bearish'):null}/>}</td>
      <td>{loading?<Sk w={65}/>:d.liquidity?<Sig type={d.liquidity.type} label={d.liquidity.label}/>:<span className="sig-n">—</span>}</td>
      <td>{loading?<Sk w={50}/>:d.swing?<Sig type={d.swing.bias!==0?d.swing.bias:null} label={d.swing.label}/>:<span className="sig-n">—</span>}</td>
      <td>{loading?<Sk w={60}/>:<PdZone pd={d.pd_zone}/>}</td>
      <td>{loading?<Sk w={44}/>:<ScoreBar n={d.confluence} bias={d.bias}/>}</td>
      <td>{loading?<Sk w={55}/>:d?<Bias v={d.bias}/>:<span className="sig-n">N/A</span>}</td>
    </tr>
  );
}

// ─────────────────────────────────────────────────────────
//  TICKER TAPE  (live prices scrolling)
// ─────────────────────────────────────────────────────────
function TickerTape({results}){
  const items=[...ALL_SYMS,...ALL_SYMS].map((s,i)=>{
    const d=results[s],m=PAIR_META[s];
    return{key:i,pair:m?.d||s,price:fmt(d?.price),chg:d?.change_pct,bias:d?.bias};
  });
  return(
    <div className="ticker">
      <div className="tick-logo">SMC<span style={{color:'var(--bull)'}}>MT5</span></div>
      <div className="ticker-inner">
        {items.map(it=>(
          <div key={it.key} className="tick-item">
            <span className="tick-pair">{it.pair}</span>
            <span className={it.bias===1?'tick-bull':it.bias===-1?'tick-bear':''}>{it.price||'···'}</span>
            {it.chg!=null&&<span className={it.chg>=0?'tick-bull':'tick-bear'}>{it.chg>=0?'▲':'▼'}{Math.abs(it.chg).toFixed(2)}%</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  ALERT LOG
// ─────────────────────────────────────────────────────────
function AlertLog({alerts,total}){
  return(
    <div className="right" style={{borderLeft:'1px solid var(--b1)'}}>
      <div className="rp-hdr">
        <span className="rp-t">⚡ Signal Alerts</span>
        <span className="al-cnt">{total}</span>
      </div>
      <div className="alert-log">
        {alerts.length===0&&<div className="empty">Awaiting signals…<br/><br/><span style={{fontSize:9,color:'var(--dim)'}}>Alerts fire on CHoCH,<br/>BOS, FVG, Bias Flip</span></div>}
        {alerts.map(a=>(
          <div key={a.id} className={`al-item ${a.direction===1?'b':a.direction===-1?'r':'a'}`}>
            <div className="al-r1">
              <span className="al-pair">{PAIR_META[a.symbol]?.d||a.symbol}</span>
              <span className="al-time">{new Date(a.ts).toLocaleTimeString()}</span>
            </div>
            <div className="al-sig">
              <span style={{color:a.direction===1?'var(--bull)':a.direction===-1?'var(--bear)':'var(--amber)'}}>
                {a.direction===1?'▲':'▼'} {a.signal}
              </span>
              <span style={{color:'var(--mid)'}}>·</span>
              <span style={{color:'var(--txt)'}}>{a.timeframe}</span>
            </div>
            <div className="al-price">@ {fmt(a.price)}{a.level?` · Lvl ${fmt(a.level)}`:''}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  SESSION BAR
// ─────────────────────────────────────────────────────────
function SessionBar({wsState,mode,cached,total}){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  const s=getSessions();
  const slist=[{n:'Sydney',k:'sydney',col:'#7eb9ff'},{n:'Tokyo',k:'tokyo',col:'#ffb347'},{n:'London',k:'london',col:'var(--bull)'},{n:'NY',k:'ny',col:'var(--bear)'}];
  return(
    <div className="sess-bar">
      {slist.map(x=>(
        <div key={x.k} className={`sess ${s[x.k]?'on':''}`} style={{color:s[x.k]?x.col:'var(--dim)'}}>
          <div className="sdot" style={{background:s[x.k]?x.col:'var(--b2)'}}/>
          {x.n}
        </div>
      ))}
      <div className="sess-right">
        <span style={{color:mode==='live'?'var(--bull)':mode==='simulation'?'var(--amber)':'var(--txt)'}}>
          {mode==='live'?'● MT5 LIVE':mode==='simulation'?'◐ SIMULATION':'○ —'}
        </span>
        <span>{cached}/{total} cached</span>
        <span>{t.toUTCString().slice(17,25)} UTC</span>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  APP
// ─────────────────────────────────────────────────────────
function App(){
  const [results,setResults]=useState({});
  const [updAt,setUpdAt]=useState({});
  const [flash,setFlash]=useState({});
  const [alerts,setAlerts]=useState([]);
  const [alertTotal,setAlertTotal]=useState(0);
  const [wsState,setWsState]=useState('disconnected'); // connecting|open|closed|error
  const [serverMode,setServerMode]=useState('—');
  const [serverInfo,setServerInfo]=useState({});
  const [catF,setCatF]=useState('All');
  const [biasF,setBiasF]=useState('All');
  const [sigF,setSigF]=useState('All');
  const [sound,setSound]=useState(false);

  const soundRef=useRef(false);
  const wsRef=useRef(null);
  soundRef.current=sound;

  // ── WebSocket connection ──
  const connect=useCallback(()=>{
    if(wsRef.current?.readyState===WebSocket.OPEN) return;
    setWsState('connecting');
    const ws=new WebSocket(WS_URL);
    wsRef.current=ws;

    ws.onopen=()=>{
      setWsState('open');
      // Ping every 20s
      const id=setInterval(()=>{
        if(ws.readyState===WebSocket.OPEN)
          ws.send(JSON.stringify({type:'ping'}));
      },20000);
      ws._pingId=id;
    };

    ws.onmessage=(e)=>{
      try{ handleMsg(JSON.parse(e.data)); }catch{}
    };

    ws.onerror=()=>setWsState('error');

    ws.onclose=()=>{
      clearInterval(ws._pingId);
      setWsState('closed');
      setTimeout(()=>connect(), RECONNECT_MS);
    };
  },[]);

  useEffect(()=>{
    connect();
    return()=>wsRef.current?.close();
  },[connect]);

  // Fetch server info on mount
  useEffect(()=>{
    fetch(`${API_URL}/api/info`)
      .then(r=>r.json())
      .then(d=>setServerInfo(d))
      .catch(()=>{});
  },[]);

  const handleMsg=useCallback((msg)=>{
    if(msg.type==='init'){
      setServerMode(msg.mode||'—');
      const data=msg.data||{};
      const now=Date.now();
      setResults(data);
      const upd={};
      Object.keys(data).forEach(s=>upd[s]=now);
      setUpdAt(upd);
    } else if(msg.type==='update'){
      const sym=msg.symbol,d=msg.data;
      if(!sym||!d)return;
      setResults(prev=>{
        const prevPrice=prev[sym]?.price;
        if(prevPrice&&d.price!==prevPrice){
          const cls=d.price>prevPrice?'fb':'fr';
          setFlash(f=>({...f,[sym]:cls}));
          setTimeout(()=>setFlash(f=>({...f,[sym]:null})),600);
        }
        return{...prev,[sym]:d};
      });
      setUpdAt(u=>({...u,[sym]:Date.now()}));
    } else if(msg.type==='alert'){
      const a={...msg.data,id:Date.now()+Math.random()};
      setAlerts(prev=>[a,...prev].slice(0,100));
      setAlertTotal(t=>t+1);
      if(soundRef.current) beep(a.direction);
    } else if(msg.type==='ping'){
      // server heartbeat – nothing to do
    }
  },[]);

  // ── Stats ──
  const vals=Object.values(results).filter(Boolean);
  const bullN=vals.filter(r=>r.bias===1).length;
  const bearN=vals.filter(r=>r.bias===-1).length;
  const neutN=vals.filter(r=>r.bias===0).length;
  const chochN=vals.filter(r=>r.choch!=null).length;
  const cached=Object.keys(results).length;

  // ── Filter ──
  const visible=useMemo(()=>ALL_SYMS.filter(s=>{
    const m=PAIR_META[s];
    if(catF!=='All'&&m.c!==catF)return false;
    const d=results[s];
    if(biasF==='Bullish'&&(!d||d.bias!==1))return false;
    if(biasF==='Bearish'&&(!d||d.bias!==-1))return false;
    if(biasF==='Neutral'&&(!d||d.bias!==0))return false;
    if(sigF==='FVG'&&(!d||!d.fvg))return false;
    if(sigF==='OB' &&(!d||!d.ob)) return false;
    if(sigF==='BOS'&&(!d||d.bos==null))return false;
    if(sigF==='CHoCH'&&(!d||d.choch==null))return false;
    if(sigF==='PD-Disc'&&(!d||d.pd_zone?.zone!=='discount'))return false;
    if(sigF==='PD-Prem'&&(!d||d.pd_zone?.zone!=='premium'))return false;
    return true;
  }),[results,catF,biasF,sigF]);

  const grouped=useMemo(()=>{const g={};visible.forEach(s=>{const c=PAIR_META[s].c;(g[c]=g[c]||[]).push(s);});return g;},[visible]);

  const wsColor={open:'var(--bull)',connecting:'var(--amber)',error:'var(--bear)',closed:'var(--bear)'};
  const wsLabel={open:'WS LIVE',connecting:'CONNECTING',error:'WS ERROR',closed:'RECONNECTING'};

  return(
    <div className="shell">
      <TickerTape results={results}/>
      <div className="body">
        <div className="left">

          {/* HEADER */}
          <div className="hdr">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div>
                <div className="logo">SMC <span>MT5</span></div>
                <div style={{fontSize:7,color:'var(--dim)',letterSpacing:1}}>SMART MONEY CONCEPTS · METATRADER 5</div>
              </div>
              <div className={`conn-pill ${wsState==='open'?serverMode==='live'?'pill-live':'pill-sim':wsState==='connecting'?'pill-conn':'pill-disc'}`}>
                <div className={`dot ${wsState==='open'?'pulse':''}`}/>
                {wsState==='open'?(serverMode==='live'?'MT5 LIVE':'SIMULATION'):wsLabel[wsState]||wsState.toUpperCase()}
              </div>
            </div>
            <div className="hdr-stats">
              <div className="hs"><div className="hs-l">Bullish</div><div className="hs-v c-bull">{bullN}</div></div>
              <div className="hs"><div className="hs-l">Bearish</div><div className="hs-v c-bear">{bearN}</div></div>
              <div className="hs"><div className="hs-l">Neutral</div><div className="hs-v" style={{color:'var(--mid)'}}>{neutN}</div></div>
              <div className="hs"><div className="hs-l">CHoCH</div><div className="hs-v c-amber">{chochN}</div></div>
              <div className="hs"><div className="hs-l">Alerts</div><div className="hs-v c-cyan">{alertTotal}</div></div>
            </div>
          </div>

          {/* SERVER BAR */}
          <div className="srv">
            <div className="srv-item">
              <div className={`srv-dot ${wsState==='open'?'srv-ok':wsState==='connecting'?'srv-wait':'srv-err'}`}/>
              <span style={{color:'var(--txt)'}}>WebSocket</span>
              <span className="srv-val" style={{color:wsColor[wsState]||'var(--txt)'}}>{wsLabel[wsState]||wsState}</span>
            </div>
            <div className="srv-item">
              <div className={`srv-dot ${serverMode==='live'?'srv-ok':serverMode==='simulation'?'srv-wait':'srv-err'}`}/>
              <span style={{color:'var(--txt)'}}>Data Source</span>
              <span className="srv-val" style={{color:serverMode==='live'?'var(--bull)':serverMode==='simulation'?'var(--amber)':'var(--mid)'}}>
                {serverMode==='live'?'MT5 Live':serverMode==='simulation'?'GBM Simulation':'—'}
              </span>
            </div>
            {serverInfo.company&&(
              <div className="srv-item">
                <div className="srv-dot srv-ok"/>
                <span style={{color:'var(--txt)'}}>Broker</span>
                <span className="srv-val">{serverInfo.company}</span>
              </div>
            )}
            {serverInfo.server&&(
              <div className="srv-item">
                <span style={{color:'var(--dim)'}}>Server</span>
                <span className="srv-val">{serverInfo.server}</span>
              </div>
            )}
            <div className="srv-r">
              <span>Backend: {API_URL}</span>
            </div>
          </div>

          {/* CONTROLS */}
          <div className="ctrl">
            <span className="cl">Category</span>
            {['All','Major','Minor','Exotic'].map(c=><button key={c} className={`btn ${catF===c?'on':''}`} onClick={()=>setCatF(c)}>{c}</button>)}
            <div className="divvr"/>
            <span className="cl">Bias</span>
            {['All','Bullish','Bearish','Neutral'].map(b=><button key={b} className={`btn ${biasF===b?'on':''}`} onClick={()=>setBiasF(b)}>{b}</button>)}
            <div className="divvr"/>
            <span className="cl">Signal</span>
            {['All','FVG','OB','BOS','CHoCH','PD-Disc','PD-Prem'].map(s=><button key={s} className={`btn ${sigF===s?'on':''}`} onClick={()=>setSigF(s)}>{s}</button>)}
            <div className="divvr ml-a"/>
            <button className={`btn-snd ${sound?'on':''}`} onClick={()=>setSound(s=>!s)}>{sound?'🔔 ON':'🔕 OFF'}</button>
            <div className="scan-info">
              <div className="sp-bar"><div className="sp-fill" style={{width:`${(cached/ALL_SYMS.length)*100}%`}}/></div>
              <span>{cached}/{ALL_SYMS.length}</span>
            </div>
          </div>

          {/* TABLE */}
          <div className="tbl-w">
            <table>
              <thead>
                <tr>
                  <th>Pair</th><th>Price</th><th>Chart</th>
                  <th>FVG</th><th>Order Block</th>
                  <th>BOS</th><th>CHoCH</th>
                  <th>Liquidity</th><th>Swing</th>
                  <th>P/D Zone</th><th>Score</th><th>Bias</th>
                </tr>
              </thead>
              <tbody>
                {['Major','Minor','Exotic'].filter(c=>catF==='All'||c===catF).map(cat=>{
                  const rows=grouped[cat]||[];
                  if(!rows.length)return null;
                  return(
                    <React.Fragment key={cat}>
                      <tr className="cat-r"><td colSpan={12}>── {cat} Pairs ({rows.length})</td></tr>
                      {rows.map(sym=>(
                        <PairRow key={sym} sym={sym} d={results[sym]}
                          updAt={updAt[sym]} flashCls={flash[sym]}/>
                      ))}
                    </React.Fragment>
                  );
                })}
                {visible.length===0&&<tr><td colSpan={12} className="empty">No pairs match filters</td></tr>}
              </tbody>
            </table>
          </div>

          <SessionBar wsState={wsState} mode={serverMode} cached={cached} total={ALL_SYMS.length}/>
        </div>

        <AlertLog alerts={alerts} total={alertTotal}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
